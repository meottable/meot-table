const PAGE_SIZE = 12;
let shown = 0;
let filtered = [...reviews];
let currentFilter = 'all';

function makeStars(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function renderCard(r) {
  return `<div class="review-card" data-tag="${r.tag}">
    <div class="review-header">
      <div class="avatar">${r.avatar}</div>
      <div class="reviewer-info">
        <div class="reviewer-name">${r.name}</div>
        <div class="reviewer-meta">
          <span class="category-tag">${r.tag}</span>
          <span>${r.loc}</span>
        </div>
      </div>
    </div>
    <div class="stars">${makeStars(r.stars)}</div>
    <div class="review-text">${r.text}</div>
    <div class="review-footer">
      <button class="like-btn" onclick="this.querySelector('strong').textContent=parseInt(this.querySelector('strong').textContent)+1;this.style.color='#C49A3C';this.style.borderColor='#C49A3C'">
        👍 도움됐어요 <strong>${r.likes}</strong>
      </button>
      <span class="date">${r.date}</span>
    </div>
  </div>`;
}

function renderMore() {
  const grid = document.getElementById('reviewsGrid');
  const batch = filtered.slice(shown, shown + PAGE_SIZE);
  batch.forEach(r => { grid.innerHTML += renderCard(r); });
  shown += batch.length;
  if (shown >= filtered.length) {
    document.getElementById('loadMoreBtn').style.display = 'none';
  } else {
    document.getElementById('loadMoreBtn').style.display = '';
  }
}

function applyFilter(f) {
  currentFilter = f;
  filtered = f === 'all' ? [...reviews] : reviews.filter(r => r.tag.includes(f));
  shown = 0;
  document.getElementById('reviewsGrid').innerHTML = '';
  renderMore();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    applyFilter(this.dataset.filter);
  });
});

document.getElementById('loadMoreBtn').addEventListener('click', renderMore);

// 초기 렌더
renderMore();
</script>
